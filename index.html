<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mẫu biểu Hộ kinh doanh</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
    <script src="https://unpkg.com/pizzip@3.1.5/dist/pizzip.min.js"></script>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <div class="container">
        <header class="header">
            <div class="logo">
                <svg width="40" height="40" viewBox="0 0 40 40" fill="none" xmlns="http://www.w3.org/2000/svg">
                    <circle cx="20" cy="20" r="18" fill="url(#gradient)"/>
                    <path d="M12 20L18 26L28 14" stroke="white" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"/>
                    <defs>
                        <linearGradient id="gradient" x1="0" y1="0" x2="40" y2="40">
                            <stop offset="0%" stop-color="#00D9FF"/>
                            <stop offset="100%" stop-color="#6366F1"/>
                        </linearGradient>
                    </defs>
                </svg>
                <span>Form</span>
            </div>
            <p class="tagline">Mẫu biểu chuẩn Hộ kinh doanh - giao diện gọn, dễ nhập liệu</p>
        </header>

        <main class="main-content">
            <form id="businessForm" class="form-container">
                <div class="form-section">
                    <h2>Thông tin giao dịch</h2>
                    <div class="form-grid">
                        <div class="form-group">
                            <label for="customerCode">Mã số khách hàng [MsKH]</label>
                            <input type="text" id="customerCode" name="customerCode" placeholder="Nhập mã số khách hàng nếu có">
                        </div>
                        <div class="form-group">
                            <label for="accountNumber">Số tài khoản [SoTK]</label>
                            <input type="text" id="accountNumber" name="accountNumber" placeholder="Nhập số tài khoản nếu có">
                        </div>
                        <div class="form-group">
                            <label for="branchName">Tên chi nhánh [TenChiNhanh]</label>
                            <input type="text" id="branchName" name="branchName" placeholder="Mặc định Thọ Xuân Thanh Hóa">
                        </div>
                        <div class="form-group">
                            <label for="locationName">Địa danh [Diadanh]</label>
                            <input type="text" id="locationName" name="locationName" placeholder="Mặc định Thanh Hóa">
                        </div>
                    </div>
                </div>

                <div class="form-section">
                    <h2>Thông tin hộ kinh doanh</h2>
                    <div class="form-grid">
                        <div class="form-group full-width">
                            <label for="businessName">Tên hộ kinh doanh [TenVN] <span class="required">*</span></label>
                            <input type="text" id="businessName" name="businessName" required placeholder="Nhập tên hộ kinh doanh">
                        </div>
                        <div class="form-group">
                            <label for="businessLicense">Số giấy phép ĐKKD [SoGT] <span class="required">*</span></label>
                            <input type="text" id="businessLicense" name="businessLicense" required placeholder="Số giấy phép đăng ký kinh doanh">
                        </div>
                        <div class="form-group">
                            <label for="taxCode">Mã số thuế [MST]</label>
                            <input type="text" id="taxCode" name="taxCode" placeholder="Nếu trống sẽ lấy số CCCD chủ hộ">
                        </div>
                        <div class="form-group">
                            <label for="businessIssueDate">Ngày cấp giấy phép [Ngcap] <span class="required">*</span></label>
                            <input type="date" id="businessIssueDate" name="businessIssueDate" required>
                        </div>
                        <div class="form-group">
                            <label for="businessIssuePlace">Nơi cấp giấy phép [NoiCap] <span class="required">*</span></label>
                            <input type="text" id="businessIssuePlace" name="businessIssuePlace" required placeholder="Nơi cấp đăng ký kinh doanh">
                        </div>
                        <div class="form-group full-width">
                            <label for="businessAddress">Địa chỉ kinh doanh [DC] <span class="required">*</span></label>
                            <input type="text" id="businessAddress" name="businessAddress" required placeholder="Số nhà, đường, phường/xã, quận/huyện, tỉnh/thành phố">
                        </div>
                    </div>
                </div>

                <div class="form-section">
                    <h2>Thông tin chủ hộ kinh doanh</h2>
                    <div class="form-grid">
                        <div class="form-group full-width">
                            <label for="ownerName">Họ tên chủ hộ KD [HoTen.GD] <span class="required">*</span></label>
                            <input type="text" id="ownerName" name="ownerName" required placeholder="Nguyễn Văn A">
                        </div>
                        <div class="form-group">
                            <label for="ownerGender">Giới tính chủ hộ KD [GT.GD] <span class="required">*</span></label>
                            <select id="ownerGender" name="ownerGender" required>
                                <option value="">Chọn giới tính</option>
                                <option value="Nam">Nam</option>
                                <option value="Nữ">Nữ</option>
                                <option value="Khác">Khác</option>
                            </select>
                        </div>
                        <div class="form-group">
                            <label for="ownerBirthDate">Ngày sinh chủ hộ KD [NgS.GD] <span class="required">*</span></label>
                            <input type="date" id="ownerBirthDate" name="ownerBirthDate" required>
                        </div>
                        <div class="form-group">
                            <label for="ownerIdNumber">Số CCCD/giấy tờ chủ hộ KD [SoCC.GD] <span class="required">*</span></label>
                            <input type="text" id="ownerIdNumber" name="ownerIdNumber" required placeholder="Số giấy tờ tùy thân">
                        </div>
                        <div class="form-group">
                            <label for="ownerIssueDate">Ngày cấp giấy tờ chủ hộ KD [NgC.GD] <span class="required">*</span></label>
                            <input type="date" id="ownerIssueDate" name="ownerIssueDate" required>
                        </div>
                        <div class="form-group">
                            <label for="ownerIssuePlace">Nơi cấp giấy tờ chủ hộ KD [NC.GD] <span class="required">*</span></label>
                            <input type="text" id="ownerIssuePlace" name="ownerIssuePlace" required placeholder="Công an tỉnh/thành phố">
                        </div>
                        <div class="form-group">
                            <label for="ownerExpiryDate">Ngày hết hạn giấy tờ chủ hộ KD [NgHH.GD] <span class="required">*</span></label>
                            <input type="date" id="ownerExpiryDate" name="ownerExpiryDate" required>
                        </div>
                        <div class="form-group full-width">
                            <label for="ownerAddress">Địa chỉ chủ hộ KD [DC.GD]</label>
                            <input type="text" id="ownerAddress" name="ownerAddress" placeholder="Nếu trống sẽ lấy địa chỉ kinh doanh">
                        </div>
                        <div class="form-group">
                            <label for="ownerPhone">Số điện thoại chủ hộ KD [SoDT.GD] <span class="required">*</span></label>
                            <input type="text" id="ownerPhone" name="ownerPhone" required placeholder="Số điện thoại chủ hộ">
                        </div>
                    </div>
                </div>

                <div class="form-section">
                    <div class="section-toolbar">
                        <h2>Trường không bắt buộc</h2>
                        <button type="button" class="btn btn-secondary btn-small" id="toggleOptionalBtn">Hiện thêm trường không bắt buộc</button>
                    </div>
                    <div class="form-grid optional-fields" id="optionalFields">
                        <div class="form-group optional-group">
                            <label for="businessField">Lĩnh vực kinh doanh [Lv.KD]</label>
                            <input type="text" id="businessField" name="businessField" placeholder="Nếu trống sẽ là ....">
                        </div>
                        <div class="form-group optional-group">
                            <label for="companyEmail">Email công ty/hộ KD [Em.Cty]</label>
                            <input type="email" id="companyEmail" name="companyEmail" placeholder="Nếu trống thì ....">
                        </div>
                        <div class="form-group optional-group">
                            <label for="contactPhone">Số điện thoại liên hệ [DT]</label>
                            <input type="text" id="contactPhone" name="contactPhone" placeholder="Nếu trống sẽ lấy số điện thoại chủ hộ">
                        </div>
                        <div class="form-group optional-group">
                            <label for="staffCode">Mã giao dịch viên [GDV]</label>
                            <input type="text" id="staffCode" name="staffCode" placeholder="Nếu không nhập thì để rỗng">
                        </div>
                    </div>
                </div>

                <div class="form-actions">
                    <button type="button" class="btn btn-secondary" onclick="resetForm()">Nhập lại</button>
                    <button type="submit" class="btn btn-primary">
                        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                            <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/>
                            <polyline points="7 10 12 15 17 10"/>
                            <line x1="12" y1="15" x2="12" y2="3"/>
                        </svg>
                        Xuất file mẫu DOCX
                    </button>
                </div>
            </form>
        </main>

        <footer class="footer">
            <p>&copy; 2025 Form. Built with ❤️</p>
        </footer>
    </div>

    <script src="js/app.js"></script>
</body>
</html>
