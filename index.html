<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mẫu biểu Hộ kinh doanh</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
    <!-- docxtemplater library -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/docxtemplater/3.37.2/docxtemplater.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/docxtemplater/3.37.2/pizzip.min.js"></script>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <div class="container">
        <header class="header">
            <div class="logo">
                <svg width="40" height="40" viewBox="0 0 40 40" fill="none" xmlns="http://www.w3.org/2000/svg">
                    <circle cx="20" cy="20" r="18" fill="url(#gradient)"/>
                    <path d="M12 20L18 26L28 14" stroke="white" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"/>
                    <defs>
                        <linearGradient id="gradient" x1="0" y1="0" x2="40" y2="40">
                            <stop offset="0%" stop-color="#00D9FF"/>
                            <stop offset="100%" stop-color="#6366F1"/>
                        </linearGradient>
                    </defs>
                </svg>
                <span>Form</span>
            </div>
            <p class="tagline">Mẫu biểu Hộ kinh doanh - Xuất file DOCX</p>
        </header>

        <main class="main-content">
            <form id="businessForm" class="form-container">
                <div class="form-section">
                    <h2>Thông Tin Hộ Kinh Doanh</h2>
                    <div class="form-grid">
                        <div class="form-group full-width">
                            <label for="businessName">Tên Hộ kinh doanh <span class="required">*</span></label>
                            <input type="text" id="businessName" name="businessName" required placeholder="Nhập tên hộ kinh doanh">
                        </div>
                        <div class="form-group">
                            <label for="businessLicense">Số giấy phép ĐKKD <span class="required">*</span></label>
                            <input type="text" id="businessLicense" name="businessLicense" required placeholder="Số ĐKKD">
                        </div>
                        <div class="form-group">
                            <label for="businessIssueDate">Ngày cấp ĐKKD</label>
                            <input type="date" id="businessIssueDate" name="businessIssueDate">
                        </div>
                        <div class="form-group full-width">
                            <label for="businessIssuePlace">Nơi cấp ĐKKD</label>
                            <input type="text" id="businessIssuePlace" name="businessIssuePlace" placeholder="Phòng ĐKKD...">
                        </div>
                    </div>
                </div>

                <div class="form-section">
                    <h2>Thông Tin Chủ Hộ</h2>
                    <div class="form-grid">
                        <div class="form-group full-width">
                            <label for="ownerName">Tên chủ hộ <span class="required">*</span></label>
                            <input type="text" id="ownerName" name="ownerName" required placeholder="Nguyễn Văn A">
                        </div>
                        <div class="form-group">
                            <label for="ownerIdNumber">Số CCCD <span class="required">*</span></label>
                            <input type="text" id="ownerIdNumber" name="ownerIdNumber" required placeholder="012345678901">
                        </div>
                        <div class="form-group">
                            <label for="ownerIssueDate">Ngày cấp CCCD</label>
                            <input type="date" id="ownerIssueDate" name="ownerIssueDate">
                        </div>
                        <div class="form-group">
                            <label for="ownerIssuePlace">Nơi cấp CCCD</label>
                            <input type="text" id="ownerIssuePlace" name="ownerIssuePlace" placeholder="Công an tỉnh/thành phố">
                        </div>
                        <div class="form-group">
                            <label for="ownerExpiryDate">Ngày hết hạn CCCD</label>
                            <input type="date" id="ownerExpiryDate" name="ownerExpiryDate">
                        </div>
                        <div class="form-group full-width">
                            <label for="businessAddress">Địa chỉ <span class="required">*</span></label>
                            <input type="text" id="businessAddress" name="businessAddress" required placeholder="Số nhà, đường, phường/xã, quận/huyện, tỉnh/thành phố">
                        </div>
                    </div>
                </div>

                <div class="form-section">
                    <h2>Xuất File</h2>
                    <div class="export-options">
                        <label class="export-option">
                            <input type="radio" name="exportFormat" value="docx" checked>
                            <span class="option-card">
                                <svg width="32" height="32" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                                    <path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/>
                                    <polyline points="14 2 14 8 20 8"/>
                                    <text x="8" y="17" font-size="6" fill="currentColor">DOCX</text>
                                </svg>
                                <span>DOCX</span>
                            </span>
                        </label>
                    </div>
                </div>

                <div class="form-actions">
                    <button type="button" class="btn btn-secondary" onclick="resetForm()">Nhập Lại</button>
                    <button type="submit" class="btn btn-primary">
                        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                            <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/>
                            <polyline points="7 10 12 15 17 10"/>
                            <line x1="12" y1="15" x2="12" y2="3"/>
                        </svg>
                        Xuất File
                    </button>
                </div>
            </form>
        </main>

        <footer class="footer">
            <p>&copy; 2025 Form. Built with ❤️</p>
        </footer>
    </div>

    <script src="js/app.js"></script>
</body>
</html>
